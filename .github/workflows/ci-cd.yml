name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_GIT_PROVIDER: github
      VERCEL_GIT_COMMIT_AUTHOR_LOGIN: ${{ github.actor }}
      VERCEL_GIT_COMMIT_AUTHOR_NAME: ${{ github.actor }}
      VERCEL_GIT_COMMIT_MESSAGE: ${{ github.event.pull_request.title || github.event.head_commit.message || 'Automatic deployment' }}
    steps:
      - uses: actions/checkout@v4

      - name: Assign branch name for Vercel
        run: git checkout -B "${{ github.head_ref || github.ref_name }}"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Set Vercel environment flags
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "VERCEL_ENV=production" >> $GITHUB_ENV
            echo "VERCEL_PROD_FLAG=--prod" >> $GITHUB_ENV
          else
            echo "VERCEL_ENV=preview" >> $GITHUB_ENV
            echo "VERCEL_PROD_FLAG=" >> $GITHUB_ENV
          fi

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=$VERCEL_ENV --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build $VERCEL_PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy-vercel
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt $VERCEL_PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Comment PR with Preview URL
        if: github.event_name == 'pull_request' && success()
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            🚀 **Preview Deployment Ready!**

            You can test the changes here: ${{ steps.deploy-vercel.outputs.url }}

            _This deployment was automatically generated via GitHub Actions._

      - name: Production Success Marker
        if: github.ref == 'refs/heads/main' && success()
        run: echo "Production deployment completed successfully."

  release:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.pkg.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Warn if tag already exists
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "::warning::Tag v${{ steps.pkg.outputs.version }} already exists. No release was created. Did you forget to bump the version in package.json?"

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
